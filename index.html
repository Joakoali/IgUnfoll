<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Unfollowers Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="lang-switcher">
        <button id="btn-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button id="btn-es" class="lang-btn active" onclick="setLanguage('es')">ES</button>
    </div>

    <div class="layout-wrapper">
        <aside class="ad-space left-ad">
            <div class="ad-placeholder">Ad Space</div>
        </aside>

        <main class="main-content">
            <div class="app-container" id="app">
            </div>
        </main>

        <aside class="ad-space right-ad">
            <div class="ad-placeholder">Ad Space</div>
        </aside>
    </div>

    <footer class="ad-footer">
        <div class="ad-placeholder horizontal">Ad Space</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
